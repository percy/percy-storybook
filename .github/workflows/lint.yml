name: Lint
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 22
      - uses: actions/cache@f4b3439a656ba812b8cb417d2d49f9c810103092 # v3.4.0
        with:
          path: node_modules
          key: ${{ runner.os }}/node-22/${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}/node-22/
      - name: Authenticate GitHub Packages
        run: cp .npmrc.config .npmrc && sed -i 's/_AUTH_TOKEN_/${{ secrets.NODE_AUTH_TOKEN }}/' .npmrc
      - run: yarn
        env:
          PERCY_POSTINSTALL_BROWSER: true
      - run: yarn lint
