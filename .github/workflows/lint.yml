name: Lint
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}/node-22/${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}/node-22/
      - name: Authenticate GitHub Packages
        run: cp .npmrc.config .npmrc && sed -i 's/_AUTH_TOKEN_/${{ secrets.NODE_AUTH_TOKEN }}/' .npmrc
      - run: yarn
        env:
          PERCY_POSTINSTALL_BROWSER: true
      - run: yarn lint
