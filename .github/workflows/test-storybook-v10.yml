name: Test
permissions:
  contents: read
on:
  push:
  workflow_dispatch:
    inputs:
      branch:
        required: false
        type: string
        default: master
jobs:
  test:
    name: Test Storybook v10
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions-ecosystem/action-regex-match@9e6c4fb3d5e898f505be7a1fb6e7b0a278f6665b
        id: regex-match
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          text: ${{ inputs.branch }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        run: exit 1
        if: ${{ github.event_name == 'workflow_dispatch' && steps.regex-match.outputs && steps.regex-match.outputs.match == '' }}
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}/node-${{ matrix.node }}/${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}/node-${{ matrix.node }}/
      - name: Authenticate GitHub Packages
        run: cp .npmrc.config .npmrc && sed -i 's/_AUTH_TOKEN_/${{ secrets.NODE_AUTH_TOKEN }}/' .npmrc
      - run: yarn
        env:
          PERCY_POSTINSTALL_BROWSER: true
      - run: yarn build
      - name: Debug npm info storybook
        continue-on-error: true
        run: |
          echo "Running npx storybook --version..."
          npx storybook --version
      - name: Set up @percy/cli from git
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_BRANCH: ${{ inputs.branch }} # Store input.branch in an environment variable
          GITHUB_WORKSPACE_PATH: ${{ github.workspace }} # Store github.workspace in an environment variable
        run: |
          cd /tmp
          git clone --branch "$INPUT_BRANCH" --depth 1 https://github.com/percy/cli
          cd cli
          PERCY_PACKAGES=`find packages -type d -mindepth 1 -maxdepth 1 | sed -e 's/packages/@percy/g' | tr '\n' ' '`
          echo "Packages: $PERCY_PACKAGES"
          git log -1
          yarn
          yarn build
          yarn global:link
          # Expose the freshly built `percy` on PATH — yarn link symlinks the
          # package but not its bin, so `npx percy` would miss it and download
          # the unrelated public `percy`.
          echo "$(yarn global bin)" >> "$GITHUB_PATH"
          export PATH="$(yarn global bin):$PATH"
          cd "$GITHUB_WORKSPACE_PATH"
          yarn link `echo $PERCY_PACKAGES`
          percy --version

      - run: yarn test:coverage
